name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: npm

permissions:
  contents: read

jobs:
  build:
    name: typecheck + build + test
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit the refreshed coverage badge on main
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: npm/package-lock.json

      - name: Install
        run: npm ci

      # The repo-root OpenAPI spec (../qpost-v3-openapi.yaml) is the source of truth for the generated
      # types; they must always be a byte-for-byte regeneration of it. (The hand-written client layer
      # on top is not generated and is not checked here.)
      - name: Verify generated types are up to date
        run: |
          npm run generate-types
          git diff --exit-code -- src/schema.gen.ts

      - name: Typecheck
        run: npm run typecheck

      - name: Test + coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      # Self-hosted coverage badge (no Codecov): render the vitest summary into a shields endpoint
      # JSON that the README badge points at. Regenerated every run; committed back on main.
      - name: Update coverage badge
        working-directory: .
        run: |
          node <<'EOF'
          const fs = require("fs");
          const pct = JSON.parse(fs.readFileSync("npm/coverage/coverage-summary.json", "utf8")).total.lines.pct;
          const color = pct>=90?"brightgreen":pct>=80?"green":pct>=70?"yellowgreen":pct>=60?"yellow":pct>=50?"orange":"red";
          fs.mkdirSync(".github/badges", { recursive: true });
          fs.writeFileSync(".github/badges/coverage.json",
            JSON.stringify({ schemaVersion: 1, label: "coverage", message: pct.toFixed(1) + "%", color }, null, 2) + "\n");
          console.log("coverage badge:", pct + "%");
          EOF

      - name: Commit coverage badge (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update coverage badge [skip ci]"
          file_pattern: .github/badges/coverage.json

  publish:
    name: publish to npmjs
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    permissions:
      contents: read
      id-token: write   # npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: npm/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # Requires an NPM_TOKEN repo secret (an npmjs automation token for the publishing org/user).
      # Add it under Settings > Secrets and variables > Actions before the first tagged release.
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
