name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: npm

permissions:
  contents: read

jobs:
  build:
    name: typecheck + build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: npm/package-lock.json

      - name: Install
        run: npm ci

      # The vendored OpenAPI spec (openapi/qpost-v3-openapi.yaml) is the source of truth; the generated
      # client types must always be a byte-for-byte regeneration of it.
      - name: Verify generated types are up to date
        run: |
          npm run generate-types
          git diff --exit-code -- src/schema.gen.ts

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  publish:
    name: publish to npmjs
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    permissions:
      contents: read
      id-token: write   # npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: npm/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # Requires an NPM_TOKEN repo secret (an npmjs automation token for the publishing org/user).
      # Add it under Settings > Secrets and variables > Actions before the first tagged release.
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
